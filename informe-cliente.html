<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe de Trabajo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #f0f0f0;
  --surface3: #e8e8e8;
  --border: #e0e0e0;
  --border2: #cccccc;
  --accent: #111111;
  --accent2: #333333;
  --accent3: #555555;
  --accent-light: #f5f5f5;
  --lime: #111111;
  --text: #111111;
  --muted: #999999;
  --muted2: #666666;
  --figma: #555555;
  --wp: #555555;
  --framer: #555555;
  --otro: #555555;
  --danger: #c0392b;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── LOCK SCREEN ── */
#lock-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #f5f5f5;
}
.lock-box {
  background: #ffffff; border: 1px solid #e5e5e5;
  border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 360px;
  text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,.07);
}
.lock-logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: #111111; border: none;
  margin: 0 auto 1.25rem;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; color: #ffffff; font-weight: 700; letter-spacing: .06em;
}
.lock-title { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; letter-spacing: -.01em; color: #111111; }
.lock-sub { font-size: .7rem; color: #999999; margin-bottom: 1.75rem; font-family: 'DM Mono', monospace; letter-spacing: .02em; }
.lock-input {
  width: 100%; background: #f5f5f5; border: 1px solid #e0e0e0;
  border-radius: 8px; padding: .75rem 1rem; color: #111111;
  font-family: 'Inter', sans-serif; font-size: .9rem;
  outline: none; margin-bottom: .75rem; transition: border-color .15s, box-shadow .15s;
  text-align: center; letter-spacing: .12em;
}
.lock-input:focus { border-color: #111111; box-shadow: 0 0 0 3px rgba(0,0,0,.06); }
.lock-btn {
  width: 100%; background: #111111; border: none; border-radius: 8px;
  padding: .85rem; color: #ffffff; font-family: 'Inter', sans-serif;
  font-size: .85rem; font-weight: 600; cursor: pointer; transition: background .15s;
  letter-spacing: .04em;
}
.lock-btn:hover { background: #000000; }
.lock-err { color: #c0392b; font-size: .68rem; font-family: 'DM Mono', monospace; margin-top: .6rem; display: none; }

/* ── APP ── */
#app-screen { display: none; }

/* TOP BAR */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.94); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 58px;
}
.topbar-logo { display: flex; align-items: center; gap: .6rem; font-weight: 800; font-size: .95rem; }
.topbar-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-size: .65rem; color: #fff; font-weight: 700; letter-spacing: .02em;
}
.topbar-period {
  font-family: 'DM Mono', monospace; font-size: .65rem;
  color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: .25rem .65rem;
}
.btn-pdf {
  display: flex; align-items: center; gap: .5rem;
  background: var(--accent); border: none; border-radius: 8px;
  padding: .45rem 1rem; color: #fff;
  font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
  font-size: .75rem; font-weight: 800; cursor: pointer; transition: all .2s;
}
.btn-pdf:hover { background: var(--accent2); }

/* CONTENT */
.content { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

/* SUMMARY CARDS */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .75rem; margin-bottom: 2rem; }
.sum-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.25rem 1.4rem;
}
.sum-card.highlight { border-color: var(--accent); background: var(--accent); color: #fff; }
.sum-n { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -.03em; }
.sum-card.highlight .sum-n { color: #ffffff; }
.sum-card.highlight .sum-l { color: rgba(255,255,255,.65); }
.sum-n.big { font-size: 1.4rem; }
.sum-l { font-family: 'DM Mono', monospace; font-size: .56rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: .3rem; }

/* SECTION */
.section-label {
  font-family: 'DM Mono', monospace; font-size: .6rem;
  text-transform: uppercase; letter-spacing: .14em;
  color: var(--muted); margin-bottom: 1rem;
}

/* WORK CARDS */
.work-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.25rem 1.4rem;
  margin-bottom: .85rem; border-left: 3px solid var(--border2);
  transition: border-color .15s;
}
.work-card:hover { border-color: var(--border2); }
.work-card.figma    { border-left-color: var(--border2); }
.work-card.wordpress{ border-left-color: var(--border2); }
.work-card.framer   { border-left-color: var(--border2); }
.work-card.otro     { border-left-color: var(--border2); }

.wc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .75rem; flex-wrap: wrap; gap: .5rem; }
.wc-left {}
.wc-title { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; }
.wc-meta { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
.wc-date { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); }
.wc-type-badge { font-size: .58rem; font-weight: 700; padding: .14rem .5rem; border-radius: 6px; text-transform: uppercase; letter-spacing: .06em; }
.b-figma    { background: var(--surface2); color: var(--muted2); border: 1px solid var(--border); }
.b-wordpress{ background: var(--surface2); color: var(--muted2); border: 1px solid var(--border); }
.b-framer   { background: var(--surface2); color: var(--muted2); border: 1px solid var(--border); }
.b-otro     { background: var(--surface2); color: var(--muted2); border: 1px solid var(--border); }

.wc-price {
  text-align: right;
}
.wc-price-num { font-size: 1.1rem; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -.02em; }
.wc-price-cur { font-family: 'DM Mono', monospace; font-size: .58rem; color: var(--muted); }

.wc-desc { font-size: .84rem; color: var(--muted2); line-height: 1.6; margin-bottom: .85rem; }
.wc-hours { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted2); margin-bottom: .6rem; }

/* FILES / ATTACHMENTS */
.wc-files { display: flex; flex-direction: column; gap: .5rem; }
.file-item {
  display: flex; align-items: center; gap: .6rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.file-thumb {
  width: 48px; height: 48px; flex-shrink: 0;
  background: var(--surface3); display: flex;
  align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.file-thumb img {
  width: 100%; height: 100%; object-fit: cover;
}
.file-info { flex: 1; padding: .4rem 0; min-width: 0; }
.file-name { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-open {
  padding: .4rem .85rem; margin-right: .5rem;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted2);
  font-size: .65rem; font-weight: 600; cursor: pointer;
  transition: all .15s; text-decoration: none;
  white-space: nowrap; flex-shrink: 0;
  font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
}
.file-open:hover { border-color: var(--accent); color: #fff; background: var(--accent); }

/* Preview grid for images */
.img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: .5rem; margin-top: .5rem; }
.img-preview {
  aspect-ratio: 1; border-radius: 8px; overflow: hidden;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; transition: all .15s;
}
.img-preview:hover { border-color: var(--accent); transform: scale(1.02); }
.img-preview img { width: 100%; height: 100%; object-fit: cover; }

/* NOTES */
.wc-notes { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); margin-top: .5rem; padding: .5rem .75rem; background: var(--surface2); border-radius: 6px; border-left: 2px solid var(--border2); }

/* TOTAL ROW */
.total-row {
  background: var(--accent);
  border: 1px solid var(--accent); border-radius: 14px;
  padding: 1.25rem 1.5rem; margin-top: 1.5rem;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
}
.total-label { font-family: 'DM Mono', monospace; font-size: .7rem; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: .1em; }
.total-num { font-size: 2rem; font-weight: 800; color: #ffffff; letter-spacing: -.03em; }
.total-cur { font-family: 'DM Mono', monospace; font-size: .7rem; color: rgba(255,255,255,.6); margin-left: .35rem; }

/* LIGHTBOX */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,.9); backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; object-fit: contain; }
#lightbox-close {
  position: fixed; top: 1.5rem; right: 1.5rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
  color: var(--text); font-size: 1.1rem; display: flex;
  align-items: center; justify-content: center;
}

/* LOADING */
#loading-screen {
  display: none; min-height: 100vh;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem;
}
#loading-screen.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-right-color: transparent; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
.footer {
  text-align: center; margin-top: 3rem;
  font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted);
}

/* PRINT */
@media print {
  .topbar, .btn-pdf, #lock-screen, #lightbox, .img-preview { display: none !important; }
  body { background: #fff !important; color: #000 !important; }
  .work-card, .sum-card, .total-row { background: #f9f9f9 !important; border-color: #ddd !important; }
  .sum-n, .wc-price-num, .total-num { color: #222 !important; }
  .wc-desc, .wc-date, .sum-l, .wc-price-cur, .total-label { color: #555 !important; }
  .content { padding: 1rem !important; }
  .wc-files { display: none !important; }
}

@media(max-width:600px) {
  .summary-grid { grid-template-columns: 1fr 1fr; }
  .topbar { padding: 0 1rem; }
  .topbar-period { display: none; }
  .content { padding: 1rem 1rem 4rem; }
}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">LN</div>
    <div style="font-family:'Instrument Serif',serif;font-style:italic;font-size:.95rem;color:var(--muted2);margin-bottom:.2rem;letter-spacing:.01em">Luis Navas</div>
    <div class="lock-title">Diseñador Visual</div>
    <div class="lock-sub">Ingresá la contraseña para acceder al informe</div>
    <input type="password" class="lock-input" id="pass-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkPass()">
    <button class="lock-btn" onclick="checkPass()">Acceder</button>
    <div class="lock-err" id="lock-err">Contraseña incorrecta</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)">Cargando informe...</div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-dot">LN</div>
      <span style="font-family:'Instrument Serif',serif;font-style:italic">Luis Navas</span>
    </div>
    <div class="topbar-period" id="topbar-period">—</div>
    <button class="btn-pdf" onclick="downloadPDF()">⬇ Descargar PDF</button>
  </div>

  <div class="content">
    <div style="margin-bottom:1.75rem">
      <div style="font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem">// informe de trabajo mensual</div>
      <div id="report-title" style="font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-.02em;line-height:1.05"></div>
      <div id="report-sub" style="font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);margin-top:.35rem"></div>
    </div>

    <div class="summary-grid" id="summary-grid"></div>

    <div class="section-label">Trabajos realizados</div>
    <div id="works-list"></div>

    <div class="total-row" id="total-row" style="display:none">
      <div>
        <div class="total-label">Total del período</div>
        <div style="font-size:.75rem;color:rgba(255,255,255,.55);margin-top:.2rem" id="total-sub"></div>
      </div>
      <div style="text-align:right">
        <div id="total-amount" style="font-size:2rem;font-weight:800;color:var(--lime)"></div>
      </div>
    </div>

    <div class="footer">Generado con Bitácora · <span id="footer-date"></span></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── PARSE URL PARAMS ──
const params = new URLSearchParams(window.location.search);
const SLUG   = params.get('slug') || 'informe';

let reportData = null;

// ── CHECK PASSWORD ──
function checkPass() {
  const val = document.getElementById('pass-input').value.trim();
  if (!val) return;
  if (!reportData) {
    loadReport(val);
  } else {
    verifyAndShow(val);
  }
}

async function loadReport(pass) {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('loading-screen').classList.add('show');

  try {
    const rawId = params.get('id');

    if (rawId) {
      // Load from GitHub raw URL — clean, public, no auth needed
      const url  = decodeURIComponent(rawId);
      const resp = await fetch(url + '?t=' + Date.now()); // cache bust
      if (!resp.ok) throw new Error(`No se pudo cargar el informe (HTTP ${resp.status})`);
      reportData = await resp.json();
    } else {
      // Fallback: decode from URL hash
      const hash = window.location.hash.slice(1);
      if (!hash) throw new Error('Link inválido.');
      const jsonStr = decodeURIComponent(escape(atob(hash)));
      reportData = JSON.parse(jsonStr);
    }

    verifyAndShow(pass);
  } catch(e) {
    document.getElementById('loading-screen').classList.remove('show');
    document.getElementById('lock-screen').style.display = 'flex';
    document.getElementById('lock-err').textContent = 'Error: ' + e.message;
    document.getElementById('lock-err').style.display = 'block';
  }
}

function verifyAndShow(pass) {
  document.getElementById('loading-screen').classList.remove('show');
  if (!reportData) { document.getElementById('lock-screen').style.display='flex'; return; }
  if (reportData.meta.password !== pass) {
    document.getElementById('lock-screen').style.display = 'flex';
    document.getElementById('lock-err').style.display = 'block';
    document.getElementById('pass-input').value = '';
    return;
  }
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-screen').style.display  = 'block';
  renderReport();
}

// ── RENDER ──
const TYPE_NAMES = { figma:'Figma / Artes', wordpress:'WordPress', framer:'Framer', otro:'Otro' };
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}
function fmtNum(n, moneda) {
  return (moneda||'') + ' ' + Number(n).toLocaleString('es-ES', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  const m = { png:'🖼',jpg:'🖼',jpeg:'🖼',gif:'🖼',webp:'🖼',svg:'🎨',pdf:'📄',
    doc:'📝',docx:'📝',fig:'🎨',zip:'🗜',mp4:'🎬',mov:'🎬',mp3:'🎵',html:'🌐' };
  return m[ext] || '📎';
}
function isImage(name) {
  return /\.(png|jpg|jpeg|gif|webp)$/i.test(name||'');
}

function renderReport() {
  const { meta, registros } = reportData;
  const title = `${MESES[meta.mes]} ${meta.anio}`;

  // Header
  document.getElementById('report-title').textContent = title;
  document.getElementById('topbar-period').textContent = title;
  document.getElementById('footer-date').textContent = new Date(meta.generadoEn).toLocaleDateString('es-ES');
  document.getElementById('report-sub').textContent =
    `${registros.length} trabajo(s) · generado el ${new Date(meta.generadoEn).toLocaleDateString('es-ES')}`;

  // Stats
  const totalH = registros.reduce((s,r) => s+(r.horas||0), 0);
  const conPrecio = registros.filter(r => r.precio > 0);
  const totalP = conPrecio.reduce((s,r) => s+(r.precio||0), 0);
  const moneda = conPrecio[0]?.moneda || 'USD';
  const clientes = [...new Set(registros.map(r=>r.cliente))].length;

  document.getElementById('summary-grid').innerHTML = `
    <div class="sum-card">
      <div class="sum-n">${registros.length}</div>
      <div class="sum-l">Trabajos</div>
    </div>
    <div class="sum-card">
      <div class="sum-n">${totalH}</div>
      <div class="sum-l">Horas totales</div>
    </div>
    <div class="sum-card">
      <div class="sum-n">${clientes}</div>
      <div class="sum-l">Cliente(s)</div>
    </div>
    ${totalP > 0 ? `<div class="sum-card highlight" style="color:#fff">
      <div class="sum-n big">${fmtNum(totalP, moneda)}</div>
      <div class="sum-l" style="color:rgba(255,255,255,.6)">Total facturado</div>
    </div>` : ''}
  `;

  // Works
  const sorted = [...registros].sort((a,b) =>
    new Date(a.fechaTrabajo||a.fecha) - new Date(b.fechaTrabajo||b.fecha));

  document.getElementById('works-list').innerHTML = sorted.map((r,i) => {
    const imgFiles = (r.archivos||[]).filter(a => isImage(a.name) && a.driveUrl);
    const otherFiles = (r.archivos||[]).filter(a => !isImage(a.name) || !a.driveUrl);
    const allFiles = r.archivos||[];

    return `
    <div class="work-card ${r.tipo}">
      <div class="wc-header">
        <div class="wc-left">
          <div class="wc-title">${r.nombreTrabajo || r.descripcion.substring(0,60) + (r.descripcion.length>60?'...':'')}</div>
          <div class="wc-meta">
            <span class="wc-date">📅 ${fmtDate(r.fechaTrabajo||r.fecha)}</span>
            <span class="wc-type-badge b-${r.tipo}">${TYPE_NAMES[r.tipo]||r.tipo}</span>
            ${r.cliente ? `<span style="font-size:.6rem;font-family:'DM Mono',monospace;color:var(--muted)">· ${r.cliente}</span>` : ''}
          </div>
        </div>
        ${r.precio > 0 ? `<div class="wc-price">
          <div class="wc-price-num">${Number(r.precio).toLocaleString('es-ES',{minimumFractionDigits:2})}</div>
          <div class="wc-price-cur">${r.moneda||'USD'}</div>
        </div>` : ''}
      </div>

      ${r.nombreTrabajo ? `<div class="wc-desc">${r.descripcion}</div>` : ''}
      ${r.horas ? `<div class="wc-hours">⏱ ${r.horas} hora(s) trabajadas</div>` : ''}

      ${imgFiles.length > 0 ? `
        <div class="img-grid">
          ${imgFiles.map(f => `
            <div class="img-preview" onclick="openLightbox('${f.driveUrl.replace(/'/g,"\\'")}','${(f.name||'').replace(/'/g,"\\'")}')">
              <img src="https://drive.google.com/thumbnail?id=${getDriveId(f.driveUrl)}&sz=w200"
                   onerror="this.parentElement.innerHTML='${fileIcon(f.name)}'"
                   alt="${f.name}" loading="lazy">
            </div>`).join('')}
        </div>` : ''}

      ${otherFiles.length > 0 ? `
        <div class="wc-files" style="margin-top:.5rem">
          ${otherFiles.map(f => `
            <div class="file-item">
              <div class="file-thumb">${fileIcon(f.name)}</div>
              <div class="file-info">
                <div class="file-name">${f.name||'Archivo'}</div>
              </div>
              ${f.driveUrl ? `<a class="file-open" href="${f.driveUrl}" target="_blank">Abrir ↗</a>` : ''}
            </div>`).join('')}
        </div>` : ''}

      ${r.notas ? `<div class="wc-notes">💬 ${r.notas}</div>` : ''}
    </div>`;
  }).join('');

  // Total
  if (totalP > 0) {
    document.getElementById('total-row').style.display = 'flex';
    document.getElementById('total-amount').textContent = fmtNum(totalP, moneda);
  document.getElementById('total-amount').style.color = '#fff';
    document.getElementById('total-sub').textContent =
      `${conPrecio.length} de ${registros.length} trabajo(s) con precio asignado`;
  }
}

function getDriveId(url) {
  if (!url) return '';
  const m = url.match(/[-\w]{25,}/);
  return m ? m[0] : '';
}

// ── LIGHTBOX ──
function openLightbox(url, name) {
  const driveId = getDriveId(url);
  const src = driveId
    ? `https://drive.google.com/thumbnail?id=${driveId}&sz=w1200`
    : url;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });
